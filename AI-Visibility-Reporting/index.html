      6. Browser shows "Run triggered — check back in ~10 minutes."
      7. VA can close the tab immediately — execution runs in GitHub Actions,
         not the browser.
      8. On completion, the PDF lands in the client's Google Drive
         Monthly Reports folder.

    UI rules inherited from the AEO tool:
      - Green = good/expected. Red = real problem only. Never red for normal states.
      - Step-by-step progress display.
