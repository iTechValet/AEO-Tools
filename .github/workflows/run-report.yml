# run-report.yml — AI Visibility Reporting Tool
#
# Triggered two ways:
#   1. workflow_dispatch       — manual trigger from the GitHub Actions UI
#                                with a typed client_id input.
#   2. repository_dispatch     — fired by the Cloudflare Worker
#                                /trigger-report endpoint when the VA hits
#                                "Run Report" in index.html. The Worker
#                                sends { event_type: "run-report",
#                                       client_payload: { client_id } }.
#
# Required GitHub Secrets:
#   ANTHROPIC_API_KEY           — parser.js (Haiku via Worker) +
#                                 narrative-engine.js + analysis-engine.js
#                                 (direct calls to api.anthropic.com)
#   OPENAI_API_KEY              — Runs 1A, 2, 4A, 5A, 6, 7A
#   GEMINI_API_KEY              — Runs 1B, 3
#   PERPLEXITY_API_KEY          — Runs 1C, 4B, 7B (sonar)
#   GROK_API_KEY                — Runs 1D, 5B (graceful fallback expected)
#   GOOGLE_SERVICE_ACCOUNT_JSON — sheet-reader / sheet-writer / drive-writer
#                                 + Drive doc fetch for 4.3A / 4.3B

name: Run AI Visibility Report

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID (e.g. itechvalet)'
        required: true
        type: string
  repository_dispatch:
    types: [run-report]

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # needed for the archive commit step below

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: AI-Visibility-Reporting
        run: npm install

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            xdg-utils

      - name: Run report
        working-directory: AI-Visibility-Reporting
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          CLIENT_ID="${{ github.event.inputs.client_id || github.event.client_payload.client_id }}"
          if [ -z "$CLIENT_ID" ]; then
            echo "No client_id supplied — aborting."
            exit 1
          fi
          echo "Running report for client: $CLIENT_ID"
          node runner.js --client=$CLIENT_ID

      - name: Commit archived JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add AI-Visibility-Reporting/archive/
          if git diff --staged --quiet; then
            echo "No new archive files to commit."
          else
            git commit -m "Archive: ${{ github.event.inputs.client_id || github.event.client_payload.client_id }} run $(date +'%Y-%m')"
            git push
          fi
